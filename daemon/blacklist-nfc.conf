# The Linux kernel NFC stack (pn533_usb) claims the ACR122U on plug-in and
# blocks pcscd/libccid from using it (readers() comes back empty).
# Install to /etc/modprobe.d/ and reboot, or unload live with:
#   sudo modprobe -r pn533_usb pn533 nfc && sudo systemctl restart pcscd
blacklist pn533_usb
blacklist pn533
blacklist nfc
